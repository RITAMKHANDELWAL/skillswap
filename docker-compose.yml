version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: skillswap_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    container_name: skillswap_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/skillswap
      - JWT_SECRET=supersecretjwtkeyfordevelopmentpurpose
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    container_name: skillswap_client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
